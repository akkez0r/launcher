<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Akkez Launcher Logo</title>
  <desc id="desc">Retro styled gradient logo with an A and cube motif.</desc>
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1328" />
      <stop offset="100%" stop-color="#1b1240" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect x="64" y="64" width="896" height="896" rx="180" fill="url(#bgGrad)" />
  <rect x="96" y="96" width="832" height="832" rx="152" fill="none" stroke="url(#accentGrad)" stroke-width="22" opacity="0.8" />

  <g filter="url(#glow)">
    <path
      d="M512 236 294 792h128l39-108h102l-35-97h-31l14-39h180l90 244h129L512 236Zm17 170 86 239h-173l87-239Z"
      fill="url(#accentGrad)"
    />
    <path
      d="M661 332h136v136H661zM690 361h78v78h-78z"
      fill="none"
      stroke="url(#accentGrad)"
      stroke-width="18"
      opacity="0.9"
    />
  </g>
</svg>
