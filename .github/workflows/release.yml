name: Release Launcher

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Bundle minecraft-source.zip (when Minecraft project present)
        run: npm run package:minecraft-source

      - name: Build + publish GitHub release artifacts
        run: npm run release

      - name: Attach minecraft-source.zip to this tag release (if built)
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ZIP="dist-artifacts/minecraft-source.zip"
          if [ -f "$ZIP" ]; then
            gh release upload "${GITHUB_REF_NAME}" "$ZIP" --clobber
          fi
